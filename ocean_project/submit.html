<!DOCTYPE html>
<html>

<head>
<title>Submit Ocean Data</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Submit Ocean Data</h2>

<form action="insert.php" method="POST">

<label>Location</label>
<input type="text" name="location" required>

<label>Temperature</label>
<input type="number" step="0.1" name="temperature">

<label>Salinity</label>
<input type="number" step="0.1" name="salinity">

<label>Fish Count</label>
<input type="number" name="fish_count">

<label>Biodiversity</label>
<input type="text" name="biodiversity">

<button type="submit">Submit Data</button>

</form>

</body>
</html>
